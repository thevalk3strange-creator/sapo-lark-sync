services:
  - type: web
    name: sapo-lark-sync
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn sync-service:app --bind 0.0.0.0:$PORT --worker-class sync --timeout 120
    envVars:
      - key: LARK_APP_ID
        sync: false
      - key: LARK_APP_SECRET
        sync: false
      - key: BASE_TOKEN
        sync: false
      - key: SAPO_STORE
        sync: false
      - key: SAPO_KEY
        sync: false
      - key: SAPO_SECRET
        sync: false
      - key: SYNC_INTERVAL_HOURS
        value: "6"
