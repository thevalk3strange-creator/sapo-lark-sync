services:
  - type: web
    name: sapo-staging-sync
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - key: LARK_APP_ID
        sync: false
      - key: LARK_APP_SECRET
        sync: false
      - key: BASE_TOKEN
        sync: false
      - key: SAPO_STORE
        sync: false
      - key: SAPO_KEY
        sync: false
      - key: SAPO_SECRET
        sync: false
